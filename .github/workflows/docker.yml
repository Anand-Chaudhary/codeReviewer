name: Docker Build & Push

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "docker-compose.yml"

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Backend
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-backend:backend-latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-backend:backend-${{ github.sha }}

      # Frontend
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-frontend:frontend-latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-frontend:frontend-${{ github.sha }}