name: Docker Build & Push

on:
  workflow_run:
    workflows:
      - Frontend CI
      - Backend CI
    types:
      - completed

jobs:
  check-ci:
    name: Verify CI Status
    runs-on: ubuntu-latest

    outputs:
      build: ${{ steps.check.outputs.build }}

    steps:
      - name: Check triggering workflow
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.workflow_run.head_branch;
            const sha = context.payload.workflow_run.head_sha;

            // Get all workflow runs for this commit
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: sha,
              per_page: 100
            });

            const frontend = runs.data.workflow_runs.find(
              r => r.name === "Frontend CI"
            );

            const backend = runs.data.workflow_runs.find(
              r => r.name === "Backend CI"
            );

            const success =
              frontend?.conclusion === "success" &&
              backend?.conclusion === "success";

            core.setOutput("build", success);

  docker:
    name: Build & Push Docker Images
    needs: check-ci
    if: needs.check-ci.outputs.build == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-backend:backend-latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-backend:backend-${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-frontend:frontend-latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-frontend:frontend-${{ github.sha }}