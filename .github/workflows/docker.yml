name: Docker Build & Push

on:
  workflow_run:
    workflows:
      - Frontend CI
      - Backend CI
    types:
      - completed

jobs:
  check-backend-ci:
    name: Verify Backend CI Status
    runs-on: ubuntu-latest

    outputs:
      build: ${{ steps.check-backend.outputs.build }}
      sha: ${{ steps.check-backend.outputs.sha }}

    steps:
      - name: Check Backend CI
        id: check-backend
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.workflow_run.head_branch;
            const sha = context.payload.workflow_run.head_sha;

            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: sha,
              per_page: 100
            });

            const backend = runs.data.workflow_runs.find(
              r => r.name === "Backend CI"
            );

            const success = backend?.conclusion === "success";
            core.setOutput("build", success);
            core.setOutput("sha", sha);

  check-frontend-ci:
    name: Verify Frontend CI Status
    runs-on: ubuntu-latest

    outputs:
      build: ${{ steps.check-frontend.outputs.build }}
      sha: ${{ steps.check-frontend.outputs.sha }}

    steps:
      - name: Check Frontend CI
        id: check-frontend
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.workflow_run.head_branch;
            const sha = context.payload.workflow_run.head_sha;

            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: sha,
              per_page: 100
            });

            const frontend = runs.data.workflow_runs.find(
              r => r.name === "Frontend CI"
            );

            const success = frontend?.conclusion === "success";
            core.setOutput("build", success);
            core.setOutput("sha", sha);

  docker-backend:
    name: Build & Push Backend Image
    needs: check-backend-ci
    if: needs.check-backend-ci.outputs.build == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-backend:backend-latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-backend:backend-${{ needs.check-backend-ci.outputs.sha }}

  docker-frontend:
    name: Build & Push Frontend Image
    needs: check-frontend-ci
    if: needs.check-frontend-ci.outputs.build == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-frontend:frontend-latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/code-reviewer-frontend:frontend-${{ needs.check-frontend-ci.outputs.sha }}
