name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"

  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      # - name: Run Tests
      #   run: npm test

      - name: Build Application
        run: npm run build