services:
  nginx:
    image: nginx:1.30-alpine
    container_name: "nginx"
    depends_on:
      - frontend
      - backend
    ports:
      - "8800:8800"
    networks:
      - code-reviewer
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  frontend:
    build: ./frontend
    networks:
      - code-reviewer
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    networks:
      - code-reviewer

networks:
  code-reviewer:
    driver: bridge